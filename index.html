<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#1a3a6b">
<title>Registro Ore</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root{--bg:#f4f3ef;--bg2:#eceae4;--surface:#fff;--border:#dddbd4;--text:#1c1c1e;--text2:#6b6967;--accent:#1a3a6b;--danger:#8b1a1a;--pill-bg:#e8eef6;--pill-text:#1a3a6b;--shadow:0 2px 12px rgba(0,0,0,0.08);--radius:14px;--font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;}
@media(prefers-color-scheme:dark){:root{--bg:#111;--bg2:#1a1a1a;--surface:#222;--border:#333344;--text:#f0efe8;--text2:#8a8a9a;--accent:#4a7fd4;--danger:#e05555;--pill-bg:#1e2d46;--pill-text:#4a7fd4;--shadow:0 4px 16px rgba(0,0,0,0.4);}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);overflow:hidden;}
#app{min-height:100vh;display:flex;flex-direction:column;}
.screen{display:none;flex-direction:column;min-height:100vh;width:100%;max-width:500px;margin:0 auto;}
.screen.active{display:flex;}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.topbar-title{font-size:17px;font-weight:600;}
.topbar-sub{font-size:12px;color:var(--text2);margin-top:2px;}
.topbar-action{background:none;border:none;color:var(--accent);font-size:14px;font-weight:500;cursor:pointer;padding:6px 0;font-family:var(--font);}
.scroll{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);}
.card-title{font-size:11px;font-weight:600;letter-spacing:0.8px;text-transform:uppercase;color:var(--text2);margin-bottom:12px;}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.stat{background:var(--bg2);border-radius:10px;padding:14px;}
.stat-label{font-size:11px;color:var(--text2);margin-bottom:4px;}
.stat-value{font-size:22px;font-weight:600;font-family:var(--mono);color:var(--text);}
.stat-value.euro{color:var(--accent);}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;border:none;border-radius:12px;font-family:var(--font);font-weight:500;cursor:pointer;transition:opacity 0.15s;width:100%;}
.btn-primary{background:var(--accent);color:#fff;padding:15px;font-size:16px;}
.btn-secondary{background:var(--bg2);color:var(--text);padding:13px;font-size:15px;border:1px solid var(--border);}
.btn-small{padding:8px 14px;font-size:13px;background:var(--pill-bg);color:var(--pill-text);border-radius:8px;border:none;}
.form-label{font-size:13px;font-weight:500;margin-bottom:6px;display:block;color:var(--text2);}
.form-control{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px;font-size:15px;color:var(--text);outline:none;}
.input-group-row{display:flex;align-items:center;gap:10px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:4px 12px;}
.input-group-row input{border:none;background:transparent;flex:1;padding:8px 0;text-align:center;font-family:var(--mono);font-weight:600;font-size:18px;}
.step-btn{background:none;border:none;color:var(--accent);font-size:24px;width:36px;height:36px;cursor:pointer;}
.tag-container{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;}
.tag{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:6px 12px;font-size:12px;cursor:pointer;}
.item{padding:14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
#toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:30px;font-size:13px;z-index:2000;display:none;}
</style>
</head>
<body>

<div id="app">
  <div id="screen-login" class="screen active" style="justify-content:center;padding:40px;">
    <div style="text-align:center;margin-bottom:40px;">
      <div style="width:70px;height:70px;background:var(--accent);border-radius:18px;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:30px;">⏱️</div>
      <h1 style="font-size:24px;font-weight:600;">Registro Ore</h1>
      <p style="color:var(--text2);margin-top:8px;">Accedi per iniziare</p>
    </div>
    <div id="g_id_onload" 
         data-client_id="849909249089-2l2pcc5s4sc7scat5n6h4k39re9541a0.apps.googleusercontent.com" 
         data-callback="handleGoogleLogin" 
         data-auto_prompt="false"
         data-auto_select="false">
    </div>
    <div class="g_id_signin" data-type="standard" data-size="large" data-theme="outline" data-text="signin_with" data-shape="rectangular" data-logo_alignment="left" style="width:100%;display:flex;justify-content:center;"></div>
  </div>

  <div id="screen-utente" class="screen">
    <div class="topbar">
      <div><div class="topbar-title" id="u-nome">Utente</div><div class="topbar-sub">Nuova Registrazione</div></div>
      <button class="topbar-action" onclick="logout()">Esci</button>
    </div>
    <div class="scroll">
      <div class="card">
        <div class="card-title">Dettagli Lavoro</div>
        <div style="margin-bottom:15px;"><label class="form-label">Data</label><input type="date" id="v-data" class="form-control"></div>
        <div style="margin-bottom:15px;">
          <label class="form-label">Ore Lavorate</label>
          <div class="input-group-row">
            <button class="step-btn" onclick="stepOre(-0.5)">−</button>
            <input type="number" id="v-ore" value="2" min="0.5" max="24" step="0.5" readonly>
            <button class="step-btn" onclick="stepOre(0.5)">+</button>
          </div>
        </div>
        <div style="margin-bottom:15px;">
          <label class="form-label">Luogo / Cantiere</label>
          <div style="display: flex; gap: 8px;">
            <input type="text" id="v-luogo" class="form-control" placeholder="Indirizzo...">
            <button class="btn-small" type="button" onclick="ottieniPosizione()" style="font-size:18px;min-width:44px;">📍</button>
          </div>
          <div class="tag-container" id="u-tag-luoghi"></div>
        </div>
        <div><label class="form-label">Note</label><input type="text" id="v-note" class="form-control" placeholder="Opzionale..."></div>
      </div>
      <button class="btn btn-primary" id="btn-salva-voce">Salva Voce</button>
      <div class="card"><div class="card-title">Riepilogo Mese</div>
        <div class="stat-grid">
          <div class="stat"><div class="stat-label">Ore Totali</div><div class="stat-value" id="u-tot-ore">0</div></div>
          <div class="stat"><div class="stat-label">Guadagno</div><div class="stat-value euro" id="u-tot-euro">0€</div></div>
        </div>
      </div>
    </div>
  </div>

  <div id="screen-admin" class="screen">
    <div class="topbar">
      <div><div class="topbar-title">Pannello Admin</div><div class="topbar-sub">Riepilogo Generale</div></div>
      <button class="topbar-action" onclick="logout()">Esci</button>
    </div>
    <div class="scroll">
      <div class="card">
        <div class="card-title">Andamento Ore Ultimi 7 Giorni</div>
        <div style="height: 180px;"><canvas id="graficoOre"></canvas></div>
      </div>
      <div class="card">
        <div class="card-title">Totali Mensili</div>
        <div class="stat-grid">
          <div class="stat"><div class="stat-label">Ore</div><div class="stat-value small" id="a-tot-ore">0</div></div>
          <div class="stat"><div class="stat-label">Euro</div><div class="stat-value small euro" id="a-tot-euro">0€</div></div>
        </div>
      </div>
      <div style="display:flex; gap:10px;">
         <button class="btn btn-secondary" onclick="inviaRiepilogo()">📤 Invia</button>
         <button class="btn btn-secondary" onclick="alert('Generazione PDF...')">📄 PDF</button>
      </div>
      <div id="a-mesi-list" style="margin-top:10px;"></div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyR0jP8U3p48n6SshxunqT-882u0iYkF-G99p1iP_AofVwEsh6eAnf-pXU-5444eY0S/exec';
const ADMIN_EMAIL = 'albertocv2013@gmail.com';
let state = { user: null, ruolo: null, voci: [], tariffa: 15, luoghi: ["Subburra", "Via Cavur 248", "P.zza Repubblica"] };

function showScreen(s) {
  document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
  document.getElementById('screen-' + s).classList.add('active');
  if(s === 'admin') setTimeout(aggiornaGrafico, 300);
}

function handleGoogleLogin(response) {
  const payload = JSON.parse(atob(response.credential.split('.')[1]));
  state.user = payload;
  const email = payload.email.toLowerCase();
  
  if (email === ADMIN_EMAIL) {
    state.ruolo = 'admin';
    showScreen('admin');
    caricaAdminData();
  } else {
    state.ruolo = 'utente';
    document.getElementById('u-nome').innerText = payload.given_name;
    showScreen('utente');
    document.getElementById('v-data').valueAsDate = new Date();
    caricaUtenteData();
    renderLuoghiTags();
  }
}

function logout() { location.reload(); }

function stepOre(v) {
  const input = document.getElementById('v-ore');
  let val = parseFloat(input.value) + v;
  if (val < 0.5) val = 0.5; input.value = val;
}

function renderLuoghiTags() {
  const cont = document.getElementById('u-tag-luoghi');
  cont.innerHTML = "";
  state.luoghi.forEach(l => {
    const t = document.createElement('div');
    t.className = 'tag'; t.innerText = l;
    t.onclick = () => document.getElementById('v-luogo').value = l;
    cont.appendChild(t);
  });
}

async function caricaUtenteData() {
  const res = await fetch(`${SCRIPT_URL}?action=getVoci&email=${state.user.email}`).then(r => r.json());
  state.voci = res.voci || [];
  aggiornaRiepilogoUtente();
}

async function caricaAdminData() {
  const res = await fetch(`${SCRIPT_URL}?action=getAdminData`).then(r => r.json());
  state.voci = res.voci || [];
  aggiornaRiepilogoAdmin();
}

function aggiornaRiepilogoUtente() {
  const tot = state.voci.reduce((a,b) => a + parseFloat(b.ore), 0);
  document.getElementById('u-tot-ore').innerText = tot;
  document.getElementById('u-tot-euro').innerText = (tot * 15).toFixed(2) + "€";
}

function aggiornaRiepilogoAdmin() {
  const tot = state.voci.reduce((a,b) => a + parseFloat(b.ore), 0);
  document.getElementById('a-tot-ore').innerText = tot;
  document.getElementById('a-tot-euro').innerText = (tot * 15).toFixed(2) + "€";
  const list = document.getElementById('a-mesi-list');
  list.innerHTML = "";
  state.voci.slice(0,10).forEach(v => {
    const d = document.createElement('div');
    d.className = 'card item';
    d.innerHTML = `<span>${v.data} - ${v.luogo}</span><strong>${v.ore}h</strong>`;
    list.appendChild(d);
  });
}

async function salvaVoce() {
  const data = document.getElementById('v-data').value;
  const ore = document.getElementById('v-ore').value;
  const luogo = document.getElementById('v-luogo').value;
  if(!luogo) return alert("Inserisci un luogo");
  
  await fetch(`${SCRIPT_URL}?action=addVoce&email=${state.user.email}&nome=${state.user.name}&data=${data}&ore=${ore}&luogo=${luogo}&note=${document.getElementById('v-note').value}`);
  alert("Salvato!");
  caricaUtenteData();
}

async function ottieniPosizione() {
  const campo = document.getElementById('v-luogo');
  campo.value = "Ricerca...";
  navigator.geolocation.getCurrentPosition(async (pos) => {
    const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${pos.coords.latitude}&lon=${pos.coords.longitude}`).then(r => r.json());
    campo.value = `${res.address.road || ''} ${res.address.house_number || ''}, ${res.address.city || ''}`.trim();
  }, () => { alert("GPS Errato"); campo.value = ""; });
}

function aggiornaGrafico() {
  const ctx = document.getElementById('graficoOre');
  if(!ctx || !state.voci.length) return;
  const giorni = []; const ore = [];
  for(let i=6; i>=0; i--) {
    const d = new Date(); d.setDate(d.getDate()-i);
    const s = d.toISOString().split('T')[0];
    giorni.push(d.toLocaleDateString('it-IT', {weekday:'short'}));
    ore.push(state.voci.filter(v => v.data === s).reduce((a,b) => a + parseFloat(b.ore), 0));
  }
  if(window.myChart) window.myChart.destroy();
  window.myChart = new Chart(ctx, {
    type:'bar',
    data: { labels: giorni, datasets: [{ label:'Ore', data: ore, backgroundColor:'#1a3a6b', borderRadius:5 }] },
    options: { responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}} }
  });
}

function inviaRiepilogo() {
  const testo = `Riepilogo Ore: ${document.getElementById('a-tot-ore').innerText} ore totali.`;
  if(navigator.share) navigator.share({title:'Riepilogo', text:testo});
  else alert(testo);
}

document.getElementById('btn-salva-voce').onclick = salvaVoce;
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#1a3a6b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Registro Ore - Accesso</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
:root{
  --bg:#f4f3ef;
  --bg2:#eceae4;
  --surface:#fff;
  --border:#dddbd4;
  --text:#1c1c1e;
  --text2:#6b6967;
  --accent:#1a3a6b;
  --danger:#8b1a1a;
  --shadow:0 2px 12px rgba(0,0,0,0.08);
  --radius:14px;
  --font:'DM Sans',sans-serif;
  --mono:'DM Mono',monospace;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#111118;
    --bg2:#1a1a24;
    --surface:#22222e;
    --border:#333344;
    --text:#f0efe8;
    --text2:#8a8a9a;
    --accent:#4a7fd4;
    --danger:#e05555;
    --shadow:0 2px 16px rgba(0,0,0,0.4);
  }
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);}
#app{min-height:100vh;display:flex;flex-direction:column;}
.screen{display:none;flex-direction:column;min-height:100vh;}
.screen.active{display:flex;}

/* Stili specifici login */
#screen-login{
  flex:1;
  align-items:center;
  justify-content:center;
  padding:30px;
  text-align:center;
}
.login-icon{
  font-size:48px;
  margin-bottom:16px;
}
.login-title{
  font-size:24px;
  font-weight:600;
  margin-bottom:6px;
}
.login-subtitle{
  color:var(--text2);
  font-size:14px;
  margin-bottom:40px;
}
#google-signin-btn{
  display:flex;
  justify-content:center;
  margin-bottom:16px;
}
.login-error{
  color:var(--danger);
  font-size:13px;
  text-align:center;
  min-height:20px;
  margin-bottom:10px;
}
.version{
  margin-top:30px;
  font-size:12px;
  color:var(--text2);
}

/* Toast */
#toast{
  position:fixed;
  bottom:90px;
  left:50%;
  transform:translateX(-50%) translateY(20px);
  background:var(--text);
  color:var(--bg);
  padding:12px 20px;
  border-radius:30px;
  font-size:14px;
  font-weight:500;
  opacity:0;
  transition:all 0.3s;
  z-index:999;
  white-space:nowrap;
  pointer-events:none;
}
#toast.show{
  opacity:1;
  transform:translateX(-50%) translateY(0);
}

/* Loader */
.loader{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  padding:20px;
  color:var(--text2);
  font-size:14px;
}
.spinner{
  width:20px;
  height:20px;
  border:2px solid var(--border);
  border-top-color:var(--accent);
  border-radius:50%;
  animation:spin 0.8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div id="app">
  
  <!-- SCREEN LOGIN -->
  <div class="screen active" id="screen-login">
    <div class="login-icon">📋</div>
    <h1 class="login-title">Registro Ore</h1>
    <p class="login-subtitle">Accedi con il tuo account Google</p>
    
    <div id="google-signin-btn"></div>
    <div class="login-error" id="login-error"></div>
    
    <p class="version">Versione 1.0 — 2026</p>
  </div>

  <!-- SCREEN POST-LOGIN (esempio base) -->
  <div class="screen" id="screen-dashboard">
    <div style="padding:40px;text-align:center;">
      <h2 style="margin-bottom:20px;">Accesso effettuato!</h2>
      <p id="user-info" style="color:var(--text2);margin-bottom:30px;"></p>
      <button onclick="logout()" style="padding:12px 24px;background:var(--accent);color:#fff;border:none;border-radius:10px;cursor:pointer;font-family:var(--font);">
        Esci
      </button>
    </div>
  </div>

</div>

<div id="toast"></div>

<script>
// ============================================================
// CONFIGURAZIONE — MODIFICA QUI I TUOI DATI
// ============================================================
var GOOGLE_CLIENT_ID = "447117247795-qpi0o4fte930lbtk8jncvro31t3b25bm.apps.googleusercontent.com";

// Email autorizzate: inserisci le email degli utenti e il loro ruolo
var UTENTI_AUTORIZZATI = {
  "andrea.cau.import@gmail.com":  "admin",
  "blackjad555@gmail.com": "utente",
  // Aggiungi altre email qui...
};

// ============================================================
// FUNZIONI BASE
// ============================================================
function toast(msg, dur) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, dur || 2500);
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(function(s){ s.classList.remove('active'); });
  document.getElementById('screen-'+id).classList.add('active');
}

// ============================================================
// GOOGLE OAUTH
// ============================================================
function initGoogleSignIn() {
  if (typeof google === 'undefined') {
    setTimeout(initGoogleSignIn, 100);
    return;
  }
  
  google.accounts.id.initialize({
    client_id: GOOGLE_CLIENT_ID,
    callback: handleGoogleLogin
  });
  
  google.accounts.id.renderButton(
    document.getElementById('google-signin-btn'),
    { theme: 'outline', size: 'large', text: 'signin_with', locale: 'it', width: 250 }
  );
}

function handleGoogleLogin(response) {
  // Decodifica il JWT token di Google
  var payload = JSON.parse(atob(response.credential.split('.')[1]));
  var email = payload.email;
  var nome = payload.name;
  var ruolo = UTENTI_AUTORIZZATI[email];

  if (!ruolo) {
    document.getElementById('login-error').textContent = '⚠ Account non autorizzato: ' + email;
    return;
  }

  // Successo! Mostra dashboard di esempio
  document.getElementById('user-info').innerHTML = 
    '<strong>' + nome + '</strong><br>' + 
    'Email: ' + email + '<br>' +
    'Ruolo: ' + ruolo;
  
  showScreen('dashboard');
  toast('✓ Benvenuto ' + nome);
  
  // Qui puoi aggiungere il reindirizzamento alla tua app principale
  // esempio: if (ruolo === 'admin') caricaPannelloAdmin(); else caricaPannelloUtente();
}

function logout() {
  if (typeof google !== 'undefined') {
    google.accounts.id.disableAutoSelect();
  }
  document.getElementById('login-error').textContent = '';
  showScreen('login');
  toast('Disconnesso');
  
  // Reinizializza il bottone Google
  setTimeout(initGoogleSignIn, 300);
}

// Avvio quando il DOM è pronto
document.addEventListener('DOMContentLoaded', function() {
  initGoogleSignIn();
});
</script>
</body>
</html>
